<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cap Santé — Assistance</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f3ee; --bg2:#f0ede6; --card:#ffffff; --card2:#f8f6f1;
  --border:rgba(26,25,22,0.1); --border2:rgba(26,25,22,0.18);
  --gold:#2d4f1c; --gold-l:rgba(45,79,28,0.08);
  --sage:#4a7a3a; --text:#1a1916; --text2:#5c5852; --text3:#a09c94;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { background:var(--bg); height:100%; }
body { font-family:'Inter',sans-serif; color:var(--text); -webkit-font-smoothing:antialiased; display:flex; flex-direction:column; height:100vh; overflow:hidden; }

.topbar { flex-shrink:0; background:rgba(245,243,238,0.92); border-bottom:1px solid var(--border); backdrop-filter:blur(16px); padding:0 18px; height:58px; display:flex; align-items:center; justify-content:space-between; }
.t-logo { font-family:'Lora',serif; font-size:1.4rem; font-weight:700; }
.t-logo span { color:var(--gold); }
.t-back { font-size:.8rem; color:var(--text2); text-decoration:none; padding:7px 14px; border:1px solid var(--border); border-radius:8px; }
.t-back:hover { border-color:var(--gold); color:var(--gold); }

.thread { flex:1; overflow-y:auto; padding:18px 16px; max-width:640px; width:100%; margin:0 auto; }
.empty-hint { text-align:center; color:var(--text2); font-size:.84rem; padding:40px 20px; line-height:1.6; }

.bubble-row { display:flex; margin-bottom:12px; }
.bubble-row.from-admin { justify-content:flex-start; }
.bubble-row.from-user { justify-content:flex-end; }
.bubble { max-width:75%; padding:10px 14px; border-radius:16px; font-size:.88rem; line-height:1.5; }
.bubble-row.from-admin .bubble { background:var(--card); border:1px solid var(--border); border-bottom-left-radius:4px; }
.bubble-row.from-user .bubble { background:var(--gold); color:#fff; border-bottom-right-radius:4px; }
.bubble-time { font-size:.65rem; color:var(--text3); margin-top:4px; text-align:right; }
.bubble-row.from-admin .bubble-time { text-align:left; }
.bubble-sender { font-size:.68rem; color:var(--sage); font-weight:600; margin-bottom:3px; }

.input-bar { flex-shrink:0; border-top:1px solid var(--border); background:var(--bg2); padding:12px 16px; display:flex; gap:10px; max-width:640px; width:100%; margin:0 auto; box-sizing:border-box; }
.input-bar textarea { flex:1; background:var(--card2); border:1px solid var(--border); border-radius:14px; color:var(--text); padding:11px 14px; font-family:'Inter',sans-serif; font-size:.88rem; resize:none; outline:none; max-height:90px; }
.input-bar textarea:focus { border-color:rgba(201,169,110,0.4); }
.send-btn { width:44px; height:44px; border-radius:50%; background:var(--gold); border:none; color:#fff; font-size:1.1rem; cursor:pointer; flex-shrink:0; }
.send-btn:disabled { opacity:.5; cursor:not-allowed; }
</style>
<script src="protect.js?v=2"></script>
</head>
<body>

<header class="topbar">
  <div class="t-logo" style="display:flex;align-items:center;gap:7px"><svg width="26" height="26" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="bg-x" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#3d6128"/><stop offset="100%" stop-color="#1e3a10"/></radialGradient></defs><circle cx="60" cy="60" r="58" fill="url(#bg-x)"/><circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/><line x1="60" y1="8" x2="60" y2="18" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/><line x1="60" y1="102" x2="60" y2="112" stroke="rgba(255,255,255,0.2)" stroke-width="1.8" stroke-linecap="round"/><line x1="8" y1="60" x2="18" y2="60" stroke="rgba(255,255,255,0.2)" stroke-width="1.8" stroke-linecap="round"/><line x1="102" y1="60" x2="112" y2="60" stroke="rgba(255,255,255,0.2)" stroke-width="1.8" stroke-linecap="round"/><rect x="57.5" y="60" width="5" height="22" rx="2.5" fill="rgba(255,255,255,0.28)"/><rect x="59" y="34" width="2" height="26" rx="1" fill="white"/><path d="M52 38 L52 50 Q52 53 55 53 L59 53" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M68 38 L68 50 Q68 53 65 53 L61 53" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="52" y1="38" x2="52" y2="45" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="68" y1="38" x2="68" y2="45" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M62 42 C65 38 72 36 72 42 C72 46 67 48 62 48Z" fill="rgba(255,255,255,0.55)"/><circle cx="60" cy="60" r="4.5" fill="#2d4f1c" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/><circle cx="60" cy="60" r="1.5" fill="white" opacity="0.8"/></svg>Cap<span> Santé</span></div>
  <a href="dashboard.html" class="t-back">← Retour</a>
</header>

<div class="thread" id="thread"></div>

<div class="input-bar">
  <textarea id="msg-input" placeholder="Écrivez votre message..." rows="1" onkeydown="handleKey(event)"></textarea>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SURL = 'https://ojzjihzsycsfkcsjptrm.supabase.co';
var SKEY = 'sb_publishable_OKU12WCtb6kR3PVJL9Sw0A_s1_ocdhl';
var sb = supabase.createClient(SURL, SKEY);

var USER=null;
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtTime(ts){ var d=new Date(ts); return d.toLocaleDateString('fr-BE',{day:'numeric',month:'short'})+' à '+d.toLocaleTimeString('fr-BE',{hour:'2-digit',minute:'2-digit'}); }

sb.auth.getSession().then(function(r){
  if(!r.data||!r.data.session){ window.location.href='index.html'; return; }
  USER = r.data.session.user;
  init();
});

async function init(){
  await loadMessages();
  markReadByUser();
  subscribeRealtime();
}

async function loadMessages(){
  var r = await sb.from('messages').select('*').eq('user_id',USER.id).order('created_at',{ascending:true});
  renderThread(r.data||[]);
}

function renderThread(msgs){
  var el = document.getElementById('thread');
  if(!msgs.length){
    el.innerHTML = '<div class="empty-hint">Une question, un souci ? Écrivez-nous ci-dessous, un membre de l\'équipe Cap Santé vous répondra directement ici.</div>';
    return;
  }
  el.innerHTML = msgs.map(function(m){
    var side = m.is_admin_sender ? 'from-admin' : 'from-user';
    return '<div class="bubble-row '+side+'"><div>'
      +(m.is_admin_sender?'<div class="bubble-sender">Équipe Cap Santé</div>':'')
      +'<div class="bubble">'+esc(m.content)+'</div>'
      +'<div class="bubble-time">'+fmtTime(m.created_at)+'</div>'
      +'</div></div>';
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function handleKey(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
}

async function sendMessage(){
  var input = document.getElementById('msg-input');
  var content = input.value.trim();
  if(!content) return;
  var btn = document.getElementById('send-btn');
  btn.disabled = true;
  var r = await sb.from('messages').insert({user_id:USER.id, sender_id:USER.id, is_admin_sender:false, content:content, read_by_user:true});
  btn.disabled = false;
  if(r.error){ alert('Erreur : '+r.error.message); return; }
  input.value = '';
  loadMessages();
}

async function markReadByUser(){
  await sb.from('messages').update({read_by_user:true}).eq('user_id',USER.id).eq('is_admin_sender',true).eq('read_by_user',false);
}

function subscribeRealtime(){
  sb.channel('chat-'+USER.id)
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'messages', filter:'user_id=eq.'+USER.id}, function(){
      loadMessages();
      markReadByUser();
    })
    .subscribe();
}
</script>
</body>
</html>
