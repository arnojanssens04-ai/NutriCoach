<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cap Santé — Assistance</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f3ee; --bg2:#f0ede6; --card:#ffffff; --card2:#f8f6f1;
  --border:rgba(26,25,22,0.1); --border2:rgba(26,25,22,0.18);
  --gold:#2d4f1c; --gold-l:rgba(45,79,28,0.08);
  --sage:#4a7a3a; --sage-l:rgba(74,122,58,0.1);
  --text:#1a1916; --text2:#5c5852; --text3:#a09c94;
  --rose:#8b2a2a;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { background:var(--bg); height:100%; }
body { font-family:'Inter',sans-serif; color:var(--text); -webkit-font-smoothing:antialiased;
       display:flex; flex-direction:column; height:100vh; overflow:hidden; }

/* ── TOPBAR ── */
.topbar { flex-shrink:0; background:rgba(245,243,238,0.96); border-bottom:1px solid var(--border);
          backdrop-filter:blur(16px); padding:0 18px; height:58px;
          display:flex; align-items:center; justify-content:space-between; }
.t-logo { font-family:'Lora',serif; font-size:1.15rem; font-weight:700; display:flex; align-items:center; gap:7px; }
.t-logo span { color:var(--gold); }
.t-back { font-size:.8rem; color:var(--text2); text-decoration:none;
          padding:7px 14px; border:1px solid var(--border); border-radius:8px; transition:all .15s; }
.t-back:hover { border-color:var(--gold); color:var(--gold); }

/* ── BANNIÈRE DISPONIBILITÉ (Plan 6 offert) ── */
.avail-banner { flex-shrink:0; background:var(--sage-l); border-bottom:1px solid rgba(74,122,58,0.15);
                padding:7px 18px; display:flex; align-items:center; gap:8px;
                font-size:.74rem; color:var(--sage); }
.avail-dot { width:7px; height:7px; border-radius:50%; background:var(--sage);
             box-shadow:0 0 0 2px rgba(74,122,58,0.2); animation:pulse-dot 2s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.5} }

/* ── CONTEXTE UTILISATEUR (Plan 3) ── */
.context-card { flex-shrink:0; background:var(--card); border-bottom:1px solid var(--border);
                padding:10px 18px; display:flex; align-items:center; gap:12px;
                max-width:640px; width:100%; margin:0 auto; }
.ctx-av { width:34px; height:34px; border-radius:50%; background:var(--gold-l);
          border:1px solid var(--border2); display:flex; align-items:center; justify-content:center;
          font-family:'Lora',serif; font-weight:700; color:var(--gold); font-size:.9rem; flex-shrink:0; }
.ctx-info { flex:1; min-width:0; }
.ctx-name { font-size:.84rem; font-weight:600; color:var(--text); }
.ctx-meta { font-size:.7rem; color:var(--text3); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ctx-stats { display:flex; gap:10px; flex-shrink:0; }
.ctx-stat { text-align:center; }
.ctx-stat-val { font-family:'Lora',serif; font-size:.95rem; font-weight:700; color:var(--gold); line-height:1; }
.ctx-stat-lbl { font-size:.6rem; color:var(--text3); text-transform:uppercase; letter-spacing:.3px; }

/* ── THREAD ── */
.thread-wrap { flex:1; overflow:hidden; display:flex; flex-direction:column; }
.thread { flex:1; overflow-y:auto; padding:16px; max-width:640px; width:100%; margin:0 auto; }
.empty-hint { text-align:center; color:var(--text2); font-size:.84rem; padding:32px 20px; line-height:1.65; }
.empty-hint strong { color:var(--gold); display:block; font-family:'Lora',serif; font-size:1.05rem; margin-bottom:8px; }

/* Bulles */
.bubble-row { display:flex; margin-bottom:10px; }
.bubble-row.from-admin { justify-content:flex-start; }
.bubble-row.from-user  { justify-content:flex-end; }
.bubble { max-width:76%; padding:10px 14px; border-radius:16px; font-size:.88rem; line-height:1.55; word-break:break-word; }
.bubble-row.from-admin .bubble { background:var(--card); border:1px solid var(--border); border-bottom-left-radius:4px; }
.bubble-row.from-user  .bubble { background:var(--gold); color:#fff; border-bottom-right-radius:4px; }
.bubble-time { font-size:.63rem; color:var(--text3); margin-top:3px; display:flex; align-items:center; gap:3px; }
.bubble-row.from-admin .bubble-time { justify-content:flex-start; }
.bubble-row.from-user  .bubble-time { justify-content:flex-end; }
.bubble-sender { font-size:.67rem; color:var(--sage); font-weight:600; margin-bottom:3px; }
/* Accusés de lecture (Plan 5) */
.read-tick { font-size:.72rem; }
.read-tick.sent     { color:rgba(255,255,255,0.5); }
.read-tick.read     { color:#a8e6a0; }

/* Indicateur de frappe (Plan 5) */
.typing-row { display:flex; margin-bottom:10px; }
.typing-bubble { background:var(--card); border:1px solid var(--border); border-radius:16px;
                 border-bottom-left-radius:4px; padding:12px 16px; display:flex; gap:5px; align-items:center; }
.typing-dot { width:7px; height:7px; border-radius:50%; background:var(--text3); }
.typing-dot:nth-child(1){ animation:bounce .9s ease-in-out infinite; }
.typing-dot:nth-child(2){ animation:bounce .9s ease-in-out .15s infinite; }
.typing-dot:nth-child(3){ animation:bounce .9s ease-in-out .3s infinite; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
.typing-sender { font-size:.67rem; color:var(--sage); font-weight:600; margin-bottom:3px; }

/* ── QUICK REPLIES (Plan 4) ── */
.quick-replies { flex-shrink:0; padding:8px 16px 0; max-width:640px; width:100%; margin:0 auto;
                 display:flex; flex-wrap:wrap; gap:7px; }
.qr-chip { padding:6px 13px; border:1px solid var(--border2); border-radius:999px;
           background:var(--card); font-size:.78rem; color:var(--text2); cursor:pointer;
           transition:all .15s; white-space:nowrap; }
.qr-chip:hover { border-color:var(--gold); color:var(--gold); background:var(--gold-l); }

/* ── INPUT BAR ── */
.input-wrap { flex-shrink:0; border-top:1px solid var(--border); background:var(--bg2);
              padding:10px 16px 12px; max-width:640px; width:100%; margin:0 auto; box-sizing:border-box; }
.input-row { display:flex; gap:10px; align-items:flex-end; }
.input-row textarea { flex:1; background:var(--card); border:1px solid var(--border); border-radius:14px;
                      color:var(--text); padding:11px 14px; font-family:'Inter',sans-serif;
                      font-size:.88rem; resize:none; outline:none; max-height:90px; transition:border-color .2s; }
.input-row textarea:focus { border-color:rgba(45,79,28,0.35); }
.send-btn { width:44px; height:44px; border-radius:50%; background:var(--gold);
            border:none; color:#fff; font-size:1.1rem; cursor:pointer; flex-shrink:0; transition:background .15s; }
.send-btn:hover { background:#3d6128; }
.send-btn:disabled { opacity:.45; cursor:not-allowed; }
</style>
<script src="protect.js?v=2"></script>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="t-logo">
    <svg width="26" height="26" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="bg-c" cx="40%" cy="35%" r="65%"><stop offset="0%" stop-color="#3d6128"/><stop offset="100%" stop-color="#1e3a10"/></radialGradient></defs><circle cx="60" cy="60" r="58" fill="url(#bg-c)"/><circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/><line x1="60" y1="8" x2="60" y2="18" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/><line x1="60" y1="102" x2="60" y2="112" stroke="rgba(255,255,255,0.2)" stroke-width="1.8" stroke-linecap="round"/><line x1="8" y1="60" x2="18" y2="60" stroke="rgba(255,255,255,0.2)" stroke-width="1.8" stroke-linecap="round"/><line x1="102" y1="60" x2="112" y2="60" stroke="rgba(255,255,255,0.2)" stroke-width="1.8" stroke-linecap="round"/><rect x="57.5" y="60" width="5" height="22" rx="2.5" fill="rgba(255,255,255,0.28)"/><rect x="59" y="34" width="2" height="26" rx="1" fill="white"/><path d="M52 38 L52 50 Q52 53 55 53 L59 53" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M68 38 L68 50 Q68 53 65 53 L61 53" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="52" y1="38" x2="52" y2="45" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="68" y1="38" x2="68" y2="45" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M62 42 C65 38 72 36 72 42 C72 46 67 48 62 48Z" fill="rgba(255,255,255,0.55)"/><circle cx="60" cy="60" r="4.5" fill="#2d4f1c" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/><circle cx="60" cy="60" r="1.5" fill="white" opacity="0.8"/></svg>
    Cap<span> Santé</span>
  </div>
  <a href="dashboard.html" class="t-back">← Retour</a>
</header>

<!-- BANNIÈRE DISPONIBILITÉ -->
<div class="avail-banner">
  <div class="avail-dot"></div>
  Équipe disponible · Répond en général sous 4h · Lun–Ven 8h–19h
</div>

<!-- CONTEXTE UTILISATEUR (Plan 3) -->
<div class="context-card" id="context-card" style="display:none">
  <div class="ctx-av" id="ctx-av">?</div>
  <div class="ctx-info">
    <div class="ctx-name" id="ctx-name">—</div>
    <div class="ctx-meta" id="ctx-meta">—</div>
  </div>
  <div class="ctx-stats" id="ctx-stats"></div>
</div>

<!-- THREAD -->
<div class="thread-wrap">
  <div class="thread" id="thread"></div>
</div>

<!-- QUICK REPLIES (Plan 4) -->
<div class="quick-replies" id="quick-replies">
  <div class="qr-chip" onclick="quickReply('❓ J\'ai une question sur mon plan alimentaire')">❓ Mon plan</div>
  <div class="qr-chip" onclick="quickReply('🎯 Je souhaite modifier mon objectif')">🎯 Objectif</div>
  <div class="qr-chip" onclick="quickReply('📊 Je ne comprends pas mon score santé')">📊 Score</div>
  <div class="qr-chip" onclick="quickReply('🐛 Je rencontre un problème technique')">🐛 Bug</div>
  <div class="qr-chip" onclick="quickReply('💬 Autre question')">💬 Autre</div>
</div>

<!-- INPUT BAR -->
<div class="input-wrap">
  <div class="input-row">
    <textarea id="msg-input" placeholder="Écrivez votre message..." rows="1"
              onkeydown="handleKey(event)" oninput="onTyping()"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SURL = 'https://ojzjihzsycsfkcsjptrm.supabase.co';
var SKEY = 'sb_publishable_OKU12WCtb6kR3PVJL9Sw0A_s1_ocdhl';
var sb   = supabase.createClient(SURL, SKEY);

var USER = null, PROF = null;
var typingTimeout = null;
var isShowingTyping = false;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtTime(ts){
  var d = new Date(ts);
  var now = new Date();
  var isToday = d.toDateString() === now.toDateString();
  var t = d.toLocaleTimeString('fr-BE',{hour:'2-digit',minute:'2-digit'});
  return isToday ? t : d.toLocaleDateString('fr-BE',{day:'numeric',month:'short'})+' '+t;
}
function today(){ var d=new Date(); return d.toISOString().slice(0,10); }

// ── INIT ──
sb.auth.getSession().then(function(r){
  if(!r.data||!r.data.session){ window.location.href='index.html'; return; }
  USER = r.data.session.user;
  loadProfile().then(function(){
    renderContextCard();
    loadMessages().then(function(){
      markReadByUser();
      checkProactiveMessages();
      subscribeRealtime();
    });
  });
});

async function loadProfile(){
  var r = await sb.from('profiles').select('*').eq('id',USER.id).single();
  PROF = r.data || {};
}

// ── PLAN 3 : CONTEXTE UTILISATEUR ──
async function renderContextCard(){
  var p = PROF || {};
  if(!p.prenom && !p.age) return;

  var card = document.getElementById('context-card');
  var av   = document.getElementById('ctx-av');
  var name = document.getElementById('ctx-name');
  var meta = document.getElementById('ctx-meta');
  var stats= document.getElementById('ctx-stats');

  card.style.display = 'flex';

  // Avatar initial
  var initial = (p.prenom||'?')[0].toUpperCase();
  av.textContent = initial;

  // Nom + sous-titre
  name.textContent = (p.prenom||'')+(p.nom?' '+p.nom:'') || 'Utilisateur';
  var obj = {perte:'Perte de poids',maintien:'Maintien',prise:'Prise de poids'};
  var pathos = (p.pathologies||[]).filter(function(x){return x!=='none';});
  meta.textContent = [
    p.age ? p.age+' ans' : '',
    obj[p.objectif] || '',
    pathos.length ? pathos.slice(0,2).join(', ') : ''
  ].filter(Boolean).join(' · ');

  // Stats rapides depuis le journal du jour
  var todayStr = today();
  var jRes = await sb.from('journal').select('kcal').eq('user_id',USER.id).eq('date',todayStr);
  var kcalToday = (jRes.data||[]).reduce(function(s,e){return s+(e.kcal||0);},0);
  var kcalTarget = p.kcal_target || 2000;
  var pct = Math.min(100, Math.round(kcalToday/kcalTarget*100));

  // Streak (jours de suite) — simplifié
  var since = new Date(); since.setDate(since.getDate()-14);
  var sRes = await sb.from('journal').select('date').eq('user_id',USER.id).gte('date',since.toISOString().slice(0,10));
  var dates = {}; (sRes.data||[]).forEach(function(r){dates[r.date]=true;});
  var streak=0, cur=new Date();
  if(!dates[todayStr]) cur.setDate(cur.getDate()-1);
  while(dates[cur.toISOString().slice(0,10)]){streak++;cur.setDate(cur.getDate()-1);}

  stats.innerHTML =
    '<div class="ctx-stat"><div class="ctx-stat-val">'+pct+'%</div><div class="ctx-stat-lbl">kcal</div></div>'
   +'<div class="ctx-stat"><div class="ctx-stat-val">'+streak+'</div><div class="ctx-stat-lbl">jours</div></div>'
   +(p.poids?'<div class="ctx-stat"><div class="ctx-stat-val">'+p.poids+'</div><div class="ctx-stat-lbl">kg</div></div>':'');
}

// ── MESSAGES ──
async function loadMessages(){
  var r = await sb.from('messages').select('*').eq('user_id',USER.id).order('created_at',{ascending:true});
  renderThread(r.data||[]);
}

function renderThread(msgs){
  var el = document.getElementById('thread');
  var qr = document.getElementById('quick-replies');

  if(!msgs.length){
    el.innerHTML = '<div class="empty-hint">'
      +'<strong>👋 Bonjour !</strong>'
      +'Une question sur votre plan, votre score ou un problème technique ?<br>'
      +'Choisissez un sujet ci-dessous ou écrivez directement — l\'équipe Cap Santé vous répondra sous 4h.</div>';
    qr.style.display = 'flex';
    return;
  }

  // Masquer les quick replies si déjà des messages (conversation lancée)
  qr.style.display = 'none';

  el.innerHTML = msgs.map(function(m){
    var isAdmin = m.is_admin_sender;
    var side = isAdmin ? 'from-admin' : 'from-user';
    var tick = '';
    if(!isAdmin){
      // Accusé de lecture : ✓✓ si lu par l'admin (read_by_admin), ✓ si juste envoyé
      tick = m.read_by_admin
        ? '<span class="read-tick read">✓✓</span>'
        : '<span class="read-tick sent">✓</span>';
    }
    return '<div class="bubble-row '+side+'">'
      +'<div>'
      +(isAdmin?'<div class="bubble-sender">Équipe Cap Santé</div>':'')
      +'<div class="bubble">'+esc(m.content)+'</div>'
      +'<div class="bubble-time">'+fmtTime(m.created_at)+tick+'</div>'
      +'</div></div>';
  }).join('');

  el.scrollTop = el.scrollHeight;
}

// ── PLAN 5 : INDICATEUR DE FRAPPE ──
function showTypingIndicator(){
  if(isShowingTyping) return;
  isShowingTyping = true;
  var el = document.getElementById('thread');
  var row = document.createElement('div');
  row.id = 'typing-indicator';
  row.className = 'typing-row';
  row.innerHTML = '<div><div class="typing-sender">Équipe Cap Santé</div>'
    +'<div class="typing-bubble">'
    +'<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>'
    +'</div></div>';
  el.appendChild(row);
  el.scrollTop = el.scrollHeight;
}

function hideTypingIndicator(){
  isShowingTyping = false;
  var row = document.getElementById('typing-indicator');
  if(row) row.remove();
}

// ── PLAN 2 : MESSAGES PROACTIFS ──
async function checkProactiveMessages(){
  var p = PROF || {};
  var key = 'capsante_proactive_'+USER.id;
  var sent = JSON.parse(localStorage.getItem(key)||'{}');

  // Vérifier s'il y a déjà des messages (ne pas renvoyer si conversation active)
  var r = await sb.from('messages').select('id').eq('user_id',USER.id).limit(1);
  var hasMessages = (r.data||[]).length > 0;

  // Message 1 : Premier message de bienvenue (si aucune conversation)
  if(!hasMessages && !sent.welcome){
    await sendAutoMessage('Bienvenue sur Cap Santé ! 👋 Je suis Arnaud, votre diététicien. N\'hésitez pas à me poser toutes vos questions sur votre plan alimentaire, votre score ou vos objectifs. Je réponds généralement sous 4h du lundi au vendredi.');
    sent.welcome = true;
    localStorage.setItem(key, JSON.stringify(sent));
    await loadMessages();
    return;
  }

  // Message 2 : Inactivité journal > 2 jours
  if(!sent['inactive_'+today()]){
    var since2 = new Date(); since2.setDate(since2.getDate()-2);
    var jRes = await sb.from('journal').select('date').eq('user_id',USER.id).gte('date',since2.toISOString().slice(0,10)).limit(1);
    if((jRes.data||[]).length === 0 && p.prenom){
      await sendAutoMessage('Bonjour '+p.prenom+' ! 🔥 Vous n\'avez pas enregistré de repas depuis 2 jours. Reprendre le suivi même partiellement aide à maintenir vos progrès. Comment se passe votre semaine ?');
      sent['inactive_'+today()] = true;
      localStorage.setItem(key, JSON.stringify(sent));
      await loadMessages();
      return;
    }
  }

  // Message 3 : Jour du bilan
  var joursFR = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  var todayName = joursFR[new Date().getDay()];
  if((p.jour_bilan||'dimanche') === todayName && !sent['bilan_'+today()]){
    var bilanRes = await sb.from('bilans').select('id').eq('user_id',USER.id).eq('date',today()).limit(1);
    if((bilanRes.data||[]).length === 0 && p.prenom){
      await sendAutoMessage('C\'est votre jour de bilan '+p.prenom+' ! 📊 Prenez quelques minutes pour faire le point sur votre semaine — cela permet d\'ajuster votre plan si besoin. Bonne semaine !');
      sent['bilan_'+today()] = true;
      localStorage.setItem(key, JSON.stringify(sent));
      await loadMessages();
    }
  }
}

async function sendAutoMessage(content){
  await sb.from('messages').insert({
    user_id: USER.id,
    sender_id: '00000000-0000-0000-0000-000000000000', // system sender
    is_admin_sender: true,
    content: content,
    read_by_user: false,
    read_by_admin: true
  });
}

// ── ENVOI UTILISATEUR ──
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }

function onTyping(){
  // Diffuse l'état "en train d'écrire" via Supabase Realtime Broadcast
  // (l'admin le reçoit dans son interface — préparé pour admin.html)
  sb.channel('typing').send({
    type:'broadcast', event:'typing',
    payload:{user_id:USER.id, name:(PROF&&PROF.prenom)||'Utilisateur'}
  });
}

function quickReply(text){
  var input = document.getElementById('msg-input');
  input.value = text;
  input.focus();
  // Masquer les chips après sélection
  document.getElementById('quick-replies').style.display = 'none';
}

async function sendMessage(){
  var input = document.getElementById('msg-input');
  var content = input.value.trim();
  if(!content) return;
  var btn = document.getElementById('send-btn');
  btn.disabled = true;
  var r = await sb.from('messages').insert({
    user_id: USER.id,
    sender_id: USER.id,
    is_admin_sender: false,
    content: content,
    read_by_user: true,
    read_by_admin: false
  }).select().single();
  btn.disabled = false;
  if(r.error){ alert('Erreur : '+r.error.message); return; }
  input.value = '';
  document.getElementById('quick-replies').style.display = 'none';
  notifyByEmail(r.data.id);
  loadMessages();
}

// Déclenche l'email de notification (admin ↔ utilisateur) sans jamais
// bloquer l'interface — un échec d'envoi ne doit pas gêner la conversation.
async function notifyByEmail(messageId){
  try{
    var session = await sb.auth.getSession();
    var token = session.data.session.access_token;
    await fetch(SURL+'/functions/v1/notify-message', {
      method:'POST',
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body: JSON.stringify({ message_id: messageId })
    });
  }catch(e){ console.warn('[Cap Santé] notification email non envoyée:', e); }
}

async function markReadByUser(){
  await sb.from('messages')
    .update({read_by_user:true})
    .eq('user_id',USER.id)
    .eq('is_admin_sender',true)
    .eq('read_by_user',false);
}

// ── PLAN 5 : REALTIME + TYPING INDICATOR ──
function subscribeRealtime(){
  // Nouveaux messages admin → affiche typing 1.2s puis le message
  sb.channel('chat-'+USER.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',
        filter:'user_id=eq.'+USER.id}, function(payload){
      if(payload.new && payload.new.is_admin_sender){
        // Animation de frappe avant d'afficher le message
        showTypingIndicator();
        setTimeout(function(){
          hideTypingIndicator();
          loadMessages();
          markReadByUser();
        }, 1200);
      } else {
        loadMessages();
      }
    })
    // Accusé de lecture : quand l'admin lit les messages de l'utilisateur
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'messages',
        filter:'user_id=eq.'+USER.id}, function(){
      loadMessages();
    })
    .subscribe();
}
</script>
