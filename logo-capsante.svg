<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#3d6128"/>
      <stop offset="100%" stop-color="#1e3a10"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond cercle principal -->
  <circle cx="60" cy="60" r="58" fill="url(#bg)"/>

  <!-- Anneau externe décoratif -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Marques cardinales (tirets subtils) -->
  <line x1="60" y1="8"  x2="60" y2="18" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="102" x2="60" y2="112" stroke="rgba(255,255,255,0.2)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="8"  y1="60" x2="18" y2="60"  stroke="rgba(255,255,255,0.2)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="102" y1="60" x2="112" y2="60" stroke="rgba(255,255,255,0.2)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Marques diagonales (45°) — encore plus subtiles -->
  <line x1="22" y1="22" x2="28" y2="28" stroke="rgba(255,255,255,0.1)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="92" y1="22" x2="98" y2="28" stroke="rgba(255,255,255,0.1)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22" y1="92" x2="28" y2="98" stroke="rgba(255,255,255,0.1)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="92" y1="92" x2="98" y2="98" stroke="rgba(255,255,255,0.1)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- N (Nord) — discret -->
  <text x="60" y="29" text-anchor="middle" fill="rgba(255,255,255,0.6)"
        font-family="Georgia, serif" font-size="8" font-weight="700" letter-spacing="0.5">N</text>

  <!-- ═══════════════════════════════════════
       AIGUILLE BOUSSOLE = UNE FOURCHETTE
       Nord (haut) = les dents de la fourchette → pointer vers la santé
       Sud (bas)   = le manche             → discret, semi-transparent
  ═══════════════════════════════════════ -->

  <!-- MANCHE (sud) — transparent -->
  <rect x="57.5" y="60" width="5" height="22" rx="2.5"
        fill="rgba(255,255,255,0.28)"/>
  <!-- Bout arrondi du manche -->
  <ellipse cx="60" cy="82" rx="2.5" ry="2" fill="rgba(255,255,255,0.2)"/>

  <!-- TIGE CENTRALE (monte vers les dents) -->
  <rect x="59" y="34" width="2" height="26" rx="1"
        fill="white" filter="url(#glow)"/>

  <!-- DENTS DE LA FOURCHETTE (nord) — 3 dents, la centrale est la tige -->
  <!-- Dent gauche -->
  <path d="M52 38 L52 50 Q52 53 55 53 L59 53" fill="none"
        stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dent droite -->
  <path d="M68 38 L68 50 Q68 53 65 53 L61 53" fill="none"
        stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Début des dents latérales (traits droits vers le haut) -->
  <line x1="52" y1="38" x2="52" y2="45" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="68" y1="38" x2="68" y2="45" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- PETITE FEUILLE — intégrée à droite de la tige, symbolise la nutrition naturelle -->
  <path d="M62 42 C65 38 72 36 72 42 C72 46 67 48 62 48 C62 48 62 44 62 42Z"
        fill="rgba(255,255,255,0.55)" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <!-- Nervure centrale de la feuille -->
  <line x1="62" y1="42" x2="70" y2="40" stroke="rgba(255,255,255,0.7)" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Centre de la boussole — pivot -->
  <circle cx="60" cy="60" r="4.5" fill="#2d4f1c" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <circle cx="60" cy="60" r="1.5" fill="white" opacity="0.8"/>
</svg>
