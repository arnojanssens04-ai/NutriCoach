<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriCoach</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html {
  height: 100%;
  background: #030805;
}

body {
  min-height: 100vh;
  background: #030805;
  font-family: 'Inter', sans-serif;
  color: #ddeee5;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* ── CANVAS ── */
canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ── AMBIENT BLOBS ── */
.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(90px);
  pointer-events: none;
  z-index: 0;
  animation: drift 22s ease-in-out infinite alternate;
}
.b1 { width:520px; height:520px; background:#00e676; opacity:.055; top:-140px; left:-120px; }
.b2 { width:380px; height:380px; background:#00bcd4; opacity:.045; bottom:-100px; right:-80px; animation-duration:28s; animation-delay:-10s; }
.b3 { width:260px; height:260px; background:#00e676; opacity:.04; top:45%; left:58%; animation-duration:17s; animation-delay:-5s; }

@keyframes drift {
  0%   { transform: translate(0, 0) scale(1); }
  100% { transform: translate(30px, 20px) scale(1.1); }
}

/* ── WRAP ── */
.wrap {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 440px;
  padding: 24px 20px;
}

/* ── CARD ── */
.card {
  background: rgba(8, 18, 12, 0.88);
  border: 1px solid rgba(0, 230, 118, 0.16);
  border-radius: 24px;
  padding: 42px 36px 36px;
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  box-shadow:
    0 0 0 1px rgba(0,230,118,0.04) inset,
    0 40px 100px rgba(0,0,0,0.7),
    0 0 80px rgba(0,230,118,0.03);
  animation: cardIn .65s cubic-bezier(.22,1,.36,1) both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(28px) scale(.96); }
  to   { opacity: 1; transform: translateY(0)    scale(1);   }
}

/* ── LOGO ── */
.logo {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 2rem;
  font-weight: 700;
  text-align: center;
  letter-spacing: -0.5px;
  margin-bottom: 5px;
}
.logo-n { color: #ddeee5; }
.logo-a {
  color: #00e676;
  text-shadow: 0 0 24px rgba(0,230,118,0.5), 0 0 48px rgba(0,230,118,0.18);
}

.tagline {
  text-align: center;
  font-size: .78rem;
  color: #6a8a76;
  margin-bottom: 32px;
  letter-spacing: .4px;
}

/* ── TABS ── */
.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(0,230,118,0.12);
  border-radius: 12px;
  padding: 5px;
  margin-bottom: 28px;
  gap: 5px;
}

.tab {
  padding: 10px;
  border-radius: 8px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: .86rem;
  font-weight: 500;
  color: #6a8a76;
  cursor: pointer;
  border: none;
  background: transparent;
  transition: all .22s ease;
}

.tab.on {
  background: rgba(0,230,118,0.13);
  color: #00e676;
  border: 1px solid rgba(0,230,118,0.28);
  text-shadow: 0 0 12px rgba(0,230,118,0.45);
  box-shadow: 0 0 16px rgba(0,230,118,0.06) inset;
}

/* ── FORMS ── */
.form { display: none; }
.form.on {
  display: block;
  animation: fu .24s ease both;
}
@keyframes fu {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── FIELDS ── */
.field { margin-bottom: 15px; }

.field label {
  display: block;
  font-size: .7rem;
  font-weight: 500;
  color: #6a8a76;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: .8px;
}

.field input {
  width: 100%;
  padding: 12px 15px;
  background: rgba(0, 0, 0, 0.4);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 11px;
  font-family: 'Inter', sans-serif;
  font-size: .92rem;
  color: #ddeee5;
  outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
  -webkit-appearance: none;
}

.field input::placeholder { color: #3a5a46; }

.field input:focus {
  border-color: rgba(0,230,118,0.5);
  background: rgba(0,230,118,0.04);
  box-shadow: 0 0 0 3px rgba(0,230,118,0.09);
}

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }

/* ── BUTTON ── */
.btn {
  width: 100%;
  padding: 14px;
  margin-top: 6px;
  background: linear-gradient(135deg, #00e676 0%, #00c853 100%);
  border: none;
  border-radius: 11px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: .94rem;
  font-weight: 600;
  color: #030805;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(0,230,118,0.32);
  transition: transform .2s, box-shadow .2s;
  letter-spacing: .2px;
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,230,118,0.44);
}
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

/* ── FORGOT ── */
.forgot {
  text-align: center;
  margin-top: 14px;
  font-size: .77rem;
  color: #4a6a56;
}
.forgot a {
  color: #00e676;
  text-decoration: none;
  opacity: .7;
  transition: opacity .15s;
}
.forgot a:hover { opacity: 1; }

/* ── MESSAGES ── */
.msg {
  padding: 10px 13px;
  border-radius: 9px;
  font-size: .8rem;
  margin-bottom: 14px;
  display: none;
  line-height: 1.5;
}
.msg.err { background: rgba(255,82,82,0.1); border: 1px solid rgba(255,82,82,0.25); color: #ff8a80; }
.msg.ok  { background: rgba(0,230,118,0.09); border: 1px solid rgba(0,230,118,0.28); color: #00e676; }
.msg.on  { display: block; animation: fu .2s ease; }

/* ── FOOTER BADGE ── */
.badge {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 20px;
  font-size: .68rem;
  color: #3a5a46;
}
.dot { width: 5px; height: 5px; border-radius: 50%; background: #00e676; opacity: .5; }

/* ── MOBILE ── */
@media (max-width: 460px) {
  .card { padding: 30px 22px 26px; border-radius: 20px; }
  .row2 { grid-template-columns: 1fr; gap: 0; }
}

@media (prefers-reduced-motion: reduce) {
  .blob, canvas { display: none; }
  .card, .form.on { animation: none; }
}
</style>
</head>
<body>

<!-- Blobs -->
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<!-- Particles -->
<canvas id="c"></canvas>

<!-- Card -->
<div class="wrap">
  <div class="card">

    <div class="logo">
      <span class="logo-n">Nutri</span><span class="logo-a">Coach</span>
    </div>
    <div class="tagline">Nutrition personnalisée &nbsp;·&nbsp; Suivi santé</div>

    <div class="tabs">
      <button class="tab on" onclick="sw('login')">Connexion</button>
      <button class="tab"    onclick="sw('signup')">Inscription</button>
    </div>

    <!-- LOGIN -->
    <div class="form on" id="fl">
      <div class="msg err" id="le"></div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="le-email" placeholder="vous@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="le-pwd" placeholder="••••••••" autocomplete="current-password"
               onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="btn" id="lb" onclick="login()">Se connecter</button>
      <div class="forgot"><a href="#" onclick="reset(event)">Mot de passe oublié ?</a></div>
    </div>

    <!-- SIGNUP -->
    <div class="form" id="fs">
      <div class="msg err" id="se"></div>
      <div class="msg ok"  id="so"></div>
      <div class="row2">
        <div class="field">
          <label>Prénom</label>
          <input type="text" id="s-pre" placeholder="Marie" autocomplete="given-name">
        </div>
        <div class="field">
          <label>Nom</label>
          <input type="text" id="s-nom" placeholder="Dupont" autocomplete="family-name">
        </div>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="s-email" placeholder="vous@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" id="s-pwd" placeholder="Min. 8 caractères" autocomplete="new-password"
               onkeydown="if(event.key==='Enter')signup()">
      </div>
      <button class="btn" id="sb" onclick="signup()">Créer mon compte</button>
    </div>

    <div class="badge">
      <div class="dot"></div>
      Données chiffrées &nbsp;·&nbsp; Hébergement EU &nbsp;·&nbsp; RGPD
    </div>

  </div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SURL = 'https://ojzjihzsycsfkcsjptrm.supabase.co';
var SKEY = 'sb_publishable_OKU12WCtb6kR3PVJL9Sw0A_s1_ocdhl';
var sb = supabase.createClient(SURL, SKEY);

function sw(t) {
  var isL = (t === 'login');
  document.querySelectorAll('.tab').forEach(function(b, i) {
    b.classList.toggle('on', isL ? i === 0 : i === 1);
  });
  document.getElementById('fl').classList.toggle('on', isL);
  document.getElementById('fs').classList.toggle('on', !isL);
  document.querySelectorAll('.msg').forEach(function(m) { m.classList.remove('on'); });
}

function showMsg(id, text, type) {
  var el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (type || 'err') + ' on';
}

async function login() {
  var e = document.getElementById('le-email').value.trim();
  var p = document.getElementById('le-pwd').value;
  if (!e || !p) { showMsg('le', 'Remplissez tous les champs.'); return; }
  var btn = document.getElementById('lb');
  btn.disabled = true; btn.textContent = 'Connexion…';
  var r = await sb.auth.signInWithPassword({ email: e, password: p });
  btn.disabled = false; btn.textContent = 'Se connecter';
  if (r.error) {
    showMsg('le', r.error.message.includes('Invalid') ? 'Email ou mot de passe incorrect.' : r.error.message);
    return;
  }
  window.location.href = 'dashboard.html';
}

async function signup() {
  var pre = document.getElementById('s-pre').value.trim();
  var nom = document.getElementById('s-nom').value.trim();
  var e   = document.getElementById('s-email').value.trim();
  var p   = document.getElementById('s-pwd').value;
  if (!pre || !nom || !e || !p) { showMsg('se', 'Remplissez tous les champs.'); return; }
  if (p.length < 8) { showMsg('se', 'Mot de passe trop court (8 caractères min).'); return; }
  var btn = document.getElementById('sb');
  btn.disabled = true; btn.textContent = 'Création…';
  var r = await sb.auth.signUp({ email: e, password: p, options: { data: { prenom: pre, nom: nom } } });
  btn.disabled = false; btn.textContent = 'Créer mon compte';
  if (r.error) { showMsg('se', r.error.message); return; }
  if (r.data && r.data.user) {
    await sb.from('profiles').upsert({ id: r.data.user.id, prenom: pre, nom: nom });
    // Auto login after signup
    var login = await sb.auth.signInWithPassword({ email: e, password: p });
    if (!login.error) {
      window.location.href = 'dashboard.html';
      return;
    }
  }
  showMsg('so', '✅ Compte créé ! Connectez-vous maintenant.', 'ok');
}

async function reset(e) {
  e.preventDefault();
  var email = document.getElementById('le-email').value.trim();
  if (!email) { showMsg('le', 'Entrez votre email d\'abord.'); return; }
  await sb.auth.resetPasswordForEmail(email);
  showMsg('le', '📧 Email de réinitialisation envoyé !', 'ok');
}

sb.auth.getSession().then(function(r) {
  if (r.data && r.data.session) window.location.href = 'dashboard.html';
});
</script>

<!-- Particles -->
<script>
(function () {
  var cv = document.getElementById('c');
  var ctx = cv.getContext('2d');
  var W, H, RAF;
  var pts = [];
  var mx = -9999, my = -9999;

  var CFG = {
    n:     85,
    speed: 0.26,
    link:  128,
    rep:   100,
    neon:  '0,230,118'
  };

  function resize() {
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
  }

  function Pt() {
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.vx = (Math.random() - .5) * CFG.speed;
    this.vy = (Math.random() - .5) * CFG.speed;
    this.r  = 1.3 + Math.random() * 1.5;
    this.base = .28 + Math.random() * .52;
    this.op   = this.base;
    this.ph   = Math.random() * Math.PI * 2;
    this.ps   = .008 + Math.random() * .014;
    this.pa   = .13  + Math.random() * .22;
  }

  Pt.prototype.tick = function () {
    var dx = this.x - mx, dy = this.y - my;
    var d  = Math.sqrt(dx * dx + dy * dy);
    if (d < CFG.rep && d > 0) {
      var f = (CFG.rep - d) / CFG.rep;
      var a = Math.atan2(dy, dx);
      this.vx += Math.cos(a) * f * .1;
      this.vy += Math.sin(a) * f * .1;
    }
    this.vx *= .968; this.vy *= .968;
    var sp = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
    if (sp < CFG.speed * .25) {
      this.vx += (Math.random() - .5) * .018;
      this.vy += (Math.random() - .5) * .018;
    }
    this.x += this.vx;
    this.y += this.vy;
    this.ph += this.ps;
    this.op = Math.max(.22, Math.min(.92, this.base + Math.sin(this.ph) * this.pa));
    var pad = 16;
    if (this.x < -pad) this.x = W + pad;
    if (this.x > W + pad) this.x = -pad;
    if (this.y < -pad) this.y = H + pad;
    if (this.y > H + pad) this.y = -pad;
  };

  Pt.prototype.draw = function () {
    var g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 5);
    g.addColorStop(0, 'rgba(' + CFG.neon + ',' + (this.op * .42) + ')');
    g.addColorStop(1, 'rgba(' + CFG.neon + ',0)');
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * 5, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + CFG.neon + ',' + this.op + ')';
    ctx.fill();
  };

  function drawLinks() {
    for (var i = 0; i < pts.length; i++) {
      for (var j = i + 1; j < pts.length; j++) {
        var a = pts[i], b = pts[j];
        var dx = a.x - b.x, dy = a.y - b.y;
        var d  = Math.sqrt(dx*dx + dy*dy);
        if (d < CFG.link) {
          var al = (1 - d / CFG.link) * .2;
          var cx = (a.x + b.x) / 2 - mx;
          var cy = (a.y + b.y) / 2 - my;
          var cd = Math.sqrt(cx*cx + cy*cy);
          if (cd < 160) al += (1 - cd / 160) * .36;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = 'rgba(' + CFG.neon + ',' + al + ')';
          ctx.lineWidth = .55;
          ctx.stroke();
        }
      }
    }
  }

  function init() {
    resize();
    pts = [];
    for (var i = 0; i < CFG.n; i++) pts.push(new Pt());
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    drawLinks();
    pts.forEach(function (p) { p.tick(); p.draw(); });
    RAF = requestAnimationFrame(loop);
  }

  window.addEventListener('resize', function () {
    cancelAnimationFrame(RAF);
    init(); loop();
  });

  window.addEventListener('mousemove', function (e) { mx = e.clientX; my = e.clientY; });
  window.addEventListener('mouseleave', function () { mx = -9999; my = -9999; });
  window.addEventListener('touchmove', function (e) {
    if (e.touches.length) { mx = e.touches[0].clientX; my = e.touches[0].clientY; }
  }, { passive: true });

  init(); loop();
})();
</script>

</body>
</html>
