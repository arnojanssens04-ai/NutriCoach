<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cap Santé — Vos goûts</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f3ee; --bg2:#f0ede6; --card:#ffffff; --card2:#f8f6f1;
  --border:rgba(26,25,22,0.1); --border2:rgba(26,25,22,0.18);
  --gold:#2d4f1c; --gold-l:rgba(45,79,28,0.08); --gold-g:rgba(45,79,28,0.04);
  --sage:#4a7a3a; --sage-l:rgba(74,122,58,0.1);
  --text:#1a1916; --text2:#5c5852; --text3:#a09c94;
  --rose:#8b2a2a; --rose-l:rgba(139,42,42,0.08);
  --r:16px; --sh:0 4px 20px rgba(26,25,22,0.08);
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html { background:var(--bg); }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden; }

.topbar { position:sticky; top:0; z-index:100; background:rgba(245,243,238,0.92); border-bottom:1px solid var(--border); backdrop-filter:blur(16px); padding:0 20px; height:58px; display:flex; align-items:center; justify-content:space-between; }
.t-logo { font-family:'Lora',serif; font-size:1.5rem; font-weight:700; }
.t-logo span { color:var(--gold); }
.t-logout { font-size:.76rem; color:var(--text3); text-decoration:none; padding:6px 12px; }
.t-logout:hover { color:var(--text2); }

.wrap { max-width:460px; margin:0 auto; padding:22px 18px 40px; }

.hero { text-align:center; margin-bottom:18px; }
.hero h1 { font-family:'Lora',serif; font-size:1.5rem; font-weight:700; margin-bottom:8px; }
.hero p { font-size:.83rem; color:var(--text2); line-height:1.55; }

.progress-wrap { display:flex; align-items:center; gap:10px; margin-bottom:26px; }
.progress-track { flex:1; height:6px; background:var(--bg2); border-radius:999px; overflow:hidden; }
.progress-fill { height:100%; background:var(--gold); border-radius:999px; transition:width .3s ease; width:0%; }
.progress-txt { font-size:.72rem; color:var(--text3); font-weight:600; white-space:nowrap; min-width:40px; text-align:right; }

#deck-zone { display:block; }
.deck-wrap { position:relative; height:380px; margin-bottom:22px; }
.swipe-card {
  position:absolute; inset:0; background:var(--card); border:1px solid var(--border); border-radius:20px;
  box-shadow:var(--sh); display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:30px; text-align:center; cursor:grab; user-select:none; will-change:transform;
}
.swipe-card:active { cursor:grabbing; }
.sc-icon { font-size:4.2rem; margin-bottom:18px; line-height:1; }
.sc-label { font-family:'Lora',serif; font-size:1.35rem; font-weight:700; margin-bottom:8px; }
.sc-sub { font-size:.78rem; color:var(--text3); }
.sc-badge {
  position:absolute; top:26px; font-family:'Lora',serif; font-weight:700; font-size:1.1rem;
  padding:6px 16px; border-radius:8px; border:3px solid; opacity:0; transform:rotate(-12deg); letter-spacing:1px;
}
.sc-badge-like { left:22px; color:var(--sage); border-color:var(--sage); transform:rotate(-12deg); }
.sc-badge-dislike { right:22px; color:var(--rose); border-color:var(--rose); transform:rotate(12deg); }

.action-row { display:flex; justify-content:center; align-items:center; gap:18px; }
.act-btn { width:58px; height:58px; border-radius:50%; border:1px solid var(--border2); background:var(--card); box-shadow:var(--sh); display:flex; align-items:center; justify-content:center; font-size:1.4rem; cursor:pointer; transition:transform .15s; }
.act-btn:active { transform:scale(0.9); }
.act-dislike { color:var(--rose); }
.act-neutral { width:46px; height:46px; font-size:1.1rem; color:var(--text3); }
.act-like { color:var(--sage); }

#deck-done { display:none; text-align:center; padding:60px 20px; }
#deck-done .dd-icon { font-size:3rem; margin-bottom:16px; }
#deck-done h2 { font-family:'Lora',serif; font-size:1.3rem; margin-bottom:8px; }
#deck-done p { font-size:.85rem; color:var(--text2); }
.spinner { width:22px; height:22px; border:3px solid var(--border); border-top-color:var(--gold); border-radius:50%; margin:18px auto 0; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

.toast { position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--text); color:#fff; padding:11px 20px; border-radius:10px; font-size:.82rem; opacity:0; pointer-events:none; transition:all .25s; z-index:999; }
.toast.on { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header class="topbar">
  <div class="t-logo">Cap<span>Santé</span></div>
  <a href="#" class="t-logout" onclick="logout();return false;">Se déconnecter</a>
</header>

<div class="wrap">
  <div class="hero">
    <h1>Vos goûts, votre plan</h1>
    <p>Dites-nous ce que vous aimez (ou pas) — Cap Santé adaptera ses suggestions de repas en conséquence. Ça prend une minute, une seule fois.</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="deck-progress-fill"></div></div>
    <div class="progress-txt" id="deck-progress-txt">0 / 0</div>
  </div>

  <div id="deck-zone">
    <div class="deck-wrap" id="deck-wrap"></div>
    <div class="action-row">
      <button class="act-btn act-dislike" onclick="buttonAction('dislike')" title="Pas fan">✕</button>
      <button class="act-btn act-neutral" onclick="buttonAction('neutre')" title="Neutre / je ne sais pas">🤷</button>
      <button class="act-btn act-like" onclick="buttonAction('like')" title="J'aime">♥</button>
    </div>
  </div>

  <div id="deck-done">
    <div class="dd-icon">🧭</div>
    <h2>Merci !</h2>
    <p>Vos préférences sont enregistrées.</p>
    <div class="spinner"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SURL = 'https://ojzjihzsycsfkcsjptrm.supabase.co';
var SKEY = 'sb_publishable_OKU12WCtb6kR3PVJL9Sw0A_s1_ocdhl';
var sb = supabase.createClient(SURL, SKEY);

var USER=null, PROF=null;

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on');},2800);}
function logout(){ sb.auth.signOut().then(function(){ window.location.href='index.html'; }); }

// ── Taxonomie de goûts — DOIT rester synchronisée avec INGREDIENT_CATEGORY_MAP
// dans dashboard.html (même liste d'ids de catégories).
var FOOD_CATEGORIES = [
  {id:'poisson', icon:'🐟', label:'Poisson', sub:'Cabillaud, saumon, colin...'},
  {id:'oeufs', icon:'🥚', label:'Œufs'},
  {id:'viande_rouge', icon:'🥩', label:'Viande rouge', sub:'Bœuf, steak...'},
  {id:'volaille', icon:'🍗', label:'Volaille', sub:'Poulet, dinde'},
  {id:'tofu', icon:'🌱', label:'Tofu & protéines végétales'},
  {id:'legumineuses', icon:'🫘', label:'Légumineuses', sub:'Lentilles, pois chiches, haricots rouges'},
  {id:'laitier', icon:'🧀', label:'Produits laitiers', sub:'Yaourt, fromage blanc, lait'},
  {id:'pain', icon:'🍞', label:'Pain'},
  {id:'riz', icon:'🍚', label:'Riz'},
  {id:'pates', icon:'🍝', label:'Pâtes'},
  {id:'cereales', icon:'🌾', label:'Céréales complètes', sub:'Quinoa, boulgour, avoine'},
  {id:'pdt', icon:'🥔', label:'Pomme de terre & patate douce'},
  {id:'legumes_verts', icon:'🥦', label:'Légumes verts', sub:'Brocoli, épinards, courgette...'},
  {id:'autres_legumes', icon:'🥕', label:'Autres légumes', sub:'Carotte, poivron, tomate'},
  {id:'fruits', icon:'🍎', label:'Fruits'},
  {id:'avocat', icon:'🥑', label:'Avocat'},
  {id:'fruits_coque', icon:'🌰', label:'Fruits à coque', sub:'Amandes, noix'}
];

var DECK = FOOD_CATEGORIES.slice().reverse(); // le dernier élément = carte du dessus
var TOTAL = DECK.length;
var RESULT = {likes:[], dislikes:[]};
var dragState = null;

function renderDeck(){
  var zone = document.getElementById('deck-wrap');
  zone.innerHTML = '';
  var visible = DECK.slice(-3);
  visible.forEach(function(cat, idx){
    var depth = visible.length - 1 - idx; // 0 = carte du dessus
    var card = document.createElement('div');
    card.className = 'swipe-card';
    card.style.zIndex = 10 - depth;
    card.style.transform = 'scale(' + (1 - depth*0.05) + ') translateY(' + (depth*10) + 'px)';
    card.style.opacity = depth > 1 ? '0' : (1 - depth*0.15);
    card.innerHTML = '<div class="sc-badge sc-badge-like">J\'AIME</div>'
      + '<div class="sc-badge sc-badge-dislike">PAS FAN</div>'
      + '<div class="sc-icon">'+cat.icon+'</div>'
      + '<div class="sc-label">'+cat.label+'</div>'
      + (cat.sub ? '<div class="sc-sub">'+cat.sub+'</div>' : '');
    zone.appendChild(card);
    if(depth===0) attachDrag(card);
  });
  updateProgress();
}

function updateProgress(){
  var done = TOTAL - DECK.length;
  document.getElementById('deck-progress-fill').style.width = (done/TOTAL*100)+'%';
  document.getElementById('deck-progress-txt').textContent = done+' / '+TOTAL;
}

function attachDrag(card){
  card.style.touchAction = 'none';
  card.addEventListener('pointerdown', function(e){
    dragState = {startX:e.clientX, dx:0, card:card};
    try{ card.setPointerCapture(e.pointerId); }catch(err){}
  });
  card.addEventListener('pointermove', function(e){
    if(!dragState || dragState.card!==card) return;
    dragState.dx = e.clientX - dragState.startX;
    var rot = dragState.dx/14;
    card.style.transform = 'translateX('+dragState.dx+'px) rotate('+rot+'deg)';
    var likeBadge = card.querySelector('.sc-badge-like');
    var dislikeBadge = card.querySelector('.sc-badge-dislike');
    var t = Math.min(1, Math.abs(dragState.dx)/100);
    if(dragState.dx>0){ likeBadge.style.opacity=t; dislikeBadge.style.opacity=0; }
    else { dislikeBadge.style.opacity=t; likeBadge.style.opacity=0; }
  });
  function endDrag(){
    if(!dragState || dragState.card!==card) return;
    var dx = dragState.dx;
    dragState = null;
    if(Math.abs(dx) > 90){
      commitSwipe(dx>0 ? 'like' : 'dislike', card);
    } else {
      card.style.transition = 'transform .25s ease';
      card.style.transform = 'scale(1) translateY(0)';
      setTimeout(function(){ card.style.transition=''; }, 250);
    }
  }
  card.addEventListener('pointerup', endDrag);
  card.addEventListener('pointercancel', endDrag);
}

function buttonAction(action){
  var top = document.querySelector('#deck-wrap .swipe-card:last-child');
  if(!top) return;
  commitSwipe(action, top);
}

function commitSwipe(action, card){
  var cat = DECK[DECK.length-1];
  if(action==='like') RESULT.likes.push(cat.id);
  else if(action==='dislike') RESULT.dislikes.push(cat.id);
  // 'neutre' : catégorie non enregistrée, ni aimée ni détestée

  var flyX = action==='like' ? 500 : (action==='dislike' ? -500 : 0);
  var flyY = action==='neutre' ? -400 : 0;
  card.style.transition = 'transform .3s ease, opacity .3s ease';
  card.style.transform = 'translate('+flyX+'px,'+flyY+'px) rotate('+(flyX/14)+'deg)';
  card.style.opacity = '0';

  DECK.pop();
  setTimeout(function(){
    if(DECK.length) renderDeck();
    else finishDeck();
  }, 220);
}

async function finishDeck(){
  document.getElementById('deck-zone').style.display='none';
  document.getElementById('deck-done').style.display='block';
  var r = await sb.from('profiles').update({food_preferences: RESULT}).eq('id', USER.id);
  if(r.error){
    document.getElementById('deck-done').innerHTML = '<div class="dd-icon">⚠️</div><h2>Petit souci</h2><p>'+esc(r.error.message)+'</p>'
      + '<button onclick="finishDeck()" style="margin-top:16px;padding:10px 22px;border-radius:10px;border:none;background:var(--gold);color:#fff;font-weight:600;cursor:pointer">Réessayer</button>';
    return;
  }
  setTimeout(function(){ window.location.href='dashboard.html'; }, 1200);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── AUTH ──
sb.auth.getSession().then(function(r){
  if(!r.data||!r.data.session){ window.location.href='index.html'; return; }
  USER = r.data.session.user;
  loadProf();
});

async function loadProf(){
  var pr = await sb.from('profiles').select('*').eq('id',USER.id).single();
  if(pr.error){ toast('❌ Erreur de chargement du profil'); return; }
  PROF = pr.data || {};

  // Profil de base pas encore rempli : direction dashboard.html qui gère cet écran.
  if(!PROF.age || !PROF.poids || !PROF.taille){ window.location.href='dashboard.html'; return; }

  // Préférences déjà renseignées : rien à refaire ici, retour au dashboard.
  if(PROF.food_preferences){ window.location.href='dashboard.html'; return; }

  renderDeck();
}
</script>
</body>
</html>
